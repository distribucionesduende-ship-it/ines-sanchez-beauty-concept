<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrecife de Coral Azul</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; max-width: 100%; max-height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 960, H = 540;
canvas.width = W;
canvas.height = H;

// ── Partículas de sedimento y plancton ────────────────────────────────────
const particles = Array.from({length: 80}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: 0.5 + Math.random() * 1.8,
  vx: (Math.random() - 0.5) * 0.3,
  vy: -0.05 - Math.random() * 0.15,
  alpha: 0.1 + Math.random() * 0.3
}));

// ── Burbujas ──────────────────────────────────────────────────────────────
const bubbles = Array.from({length: 30}, () => ({
  x: Math.random() * W,
  y: H + Math.random() * 80,
  r: 1.5 + Math.random() * 4,
  speed: 0.3 + Math.random() * 0.7,
  wobble: Math.random() * Math.PI * 2,
  wobbleSpeed: 0.015 + Math.random() * 0.025
}));

// ── Arrecife de coral azul ────────────────────────────────────────────────
// Paleta 100 % azules y cianos profundos
const CORAL_PALETTE = [
  '#1a6b8a', // azul petróleo
  '#0e4d6e', // azul marino oscuro
  '#2980b9', // azul medio
  '#1abc9c', // azul-verde turquesa
  '#117a8b', // azul oscuro
  '#0a7075', // azul-verde oscuro
  '#1b6ca8', // azul cobalto
  '#23a6d5', // azul claro
];

const corals = [
  { x:  70, h: 110, w: 20, color: CORAL_PALETTE[0], type: 'branch' },
  { x: 155, h:  75, w: 32, color: CORAL_PALETTE[1], type: 'fan'    },
  { x: 250, h: 100, w: 22, color: CORAL_PALETTE[2], type: 'branch' },
  { x: 335, h:  60, w: 36, color: CORAL_PALETTE[3], type: 'round'  },
  { x: 420, h: 120, w: 18, color: CORAL_PALETTE[4], type: 'branch' },
  { x: 510, h:  70, w: 30, color: CORAL_PALETTE[5], type: 'fan'    },
  { x: 600, h: 105, w: 22, color: CORAL_PALETTE[6], type: 'branch' },
  { x: 690, h:  55, w: 34, color: CORAL_PALETTE[7], type: 'round'  },
  { x: 780, h:  90, w: 19, color: CORAL_PALETTE[0], type: 'branch' },
  { x: 870, h:  80, w: 26, color: CORAL_PALETTE[2], type: 'fan'    },
  { x: 130, h:  50, w: 28, color: CORAL_PALETTE[3], type: 'round'  },
  { x: 460, h:  60, w: 24, color: CORAL_PALETTE[7], type: 'fan'    },
  { x: 740, h:  48, w: 30, color: CORAL_PALETTE[1], type: 'round'  },
  { x: 910, h:  65, w: 20, color: CORAL_PALETTE[4], type: 'branch' },
];

// ── Plantas marinas ────────────────────────────────────────────────────────
const seaweeds = Array.from({length: 18}, (_, i) => ({
  x: 20 + i * 54 + Math.random() * 20,
  segments: 6 + Math.floor(Math.random() * 5),
  height: 45 + Math.random() * 55,
  color: ['#0a7075','#117a8b','#0e6655','#148f77'][Math.floor(Math.random()*4)],
  phase: Math.random() * Math.PI * 2,
  thickness: 1.5 + Math.random() * 2
}));

// ── Cáusticas (efecto de luz bajo el agua) ────────────────────────────────
const caustics = Array.from({length: 12}, (_, i) => ({
  x: 60 + i * 80 + Math.random() * 30,
  phase: Math.random() * Math.PI * 2,
  size: 30 + Math.random() * 50
}));

// ── Peces realistas ────────────────────────────────────────────────────────
class Fish {
  constructor(x, y, size, speed, dir) {
    this.x   = x;
    this.y   = y;
    this.baseY = y;
    this.size  = size;
    this.speed = speed;
    this.dir   = dir;
    this.t     = Math.random() * Math.PI * 2;
    this.tailAngle = 0;
    // Tonos réalistes: azulados, plateados, verdosos marinos
    const schemes = [
      { b1: '#4a9fba', b2: '#82cfe0', stripe: 'rgba(255,255,255,0.25)' },
      { b1: '#2e6e8a', b2: '#5aaec9', stripe: 'rgba(200,240,255,0.2)' },
      { b1: '#1a7a6e', b2: '#35b09a', stripe: 'rgba(180,255,240,0.2)' },
      { b1: '#3a5f8a', b2: '#6490b8', stripe: 'rgba(200,220,255,0.22)' },
      { b1: '#5a7a3a', b2: '#8ab060', stripe: 'rgba(220,255,180,0.18)' },
      { b1: '#1c5e8a', b2: '#2e8fc0', stripe: 'rgba(180,230,255,0.2)' },
    ];
    const sc = schemes[Math.floor(Math.random() * schemes.length)];
    this.bodyColor1 = sc.b1;
    this.bodyColor2 = sc.b2;
    this.stripeColor = sc.stripe;
  }

  update() {
    this.t += 0.035;
    this.tailAngle = Math.sin(this.t * 3.2) * 0.42;
    this.x += this.speed * this.dir;
    this.y = this.baseY + Math.sin(this.t * 0.9) * 12;
    if (this.x >  W + 120) { this.x = -120; this.dir =  1; }
    if (this.x < -120)     { this.x =  W + 120; this.dir = -1; }
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    if (this.dir === -1) ctx.scale(-1, 1);
    const s = this.size;

    // ── Cola ──────────────────────────────────────────────────────────────
    const tw  = this.tailAngle;
    const tbX = -s * 0.55;
    const ttX = -s * 1.85;
    const tsp = s * 1.25;
    const tailColor1 = this.bodyColor1;
    const tailColor2 = this.bodyColor2;

    for (let lobe of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(tbX, lobe * s * 0.18);
      ctx.quadraticCurveTo(
        ttX - s * 0.25, lobe * tsp * 0.35 + tw * s * 1.8,
        ttX,             lobe * tsp         + tw * s * 1.8
      );
      ctx.quadraticCurveTo(ttX + s * 0.35, tw * s * 1.3, tbX, lobe * -s * 0.12);
      ctx.closePath();
      const gT = ctx.createLinearGradient(tbX, 0, ttX, 0);
      gT.addColorStop(0, tailColor1);
      gT.addColorStop(1, tailColor2);
      ctx.fillStyle = gT;
      ctx.globalAlpha = 0.92;
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // nervios de cola
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 0.7;
    for (let i = 0; i < 6; i++) {
      const frac = i / 5;
      ctx.beginPath();
      ctx.moveTo(tbX, 0);
      ctx.lineTo(ttX, (-tsp + tsp * 2 * frac) + tw * s * 1.8);
      ctx.stroke();
    }

    // ── Cuerpo ─────────────────────────────────────────────────────────────
    const gBody = ctx.createRadialGradient(s * 0.15, -s * 0.1, s * 0.04, 0, 0, s * 0.95);
    gBody.addColorStop(0, this.bodyColor2);
    gBody.addColorStop(1, this.bodyColor1);
    ctx.beginPath();
    ctx.ellipse(0, 0, s, s * 0.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = gBody;
    ctx.fill();

    // vientre (reflejo suave)
    ctx.beginPath();
    ctx.ellipse(s * 0.08, s * 0.14, s * 0.48, s * 0.18, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.14)';
    ctx.fill();

    // línea lateral
    ctx.beginPath();
    ctx.moveTo(-s * 0.5, 0);
    ctx.quadraticCurveTo(0, -s * 0.08, s * 0.7, -s * 0.05);
    ctx.strokeStyle = this.stripeColor;
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // ── Aleta dorsal ───────────────────────────────────────────────────────
    ctx.beginPath();
    ctx.moveTo(-s * 0.15, -s * 0.48);
    ctx.quadraticCurveTo(s * 0.25, -s * 1.0, s * 0.48, -s * 0.48);
    ctx.quadraticCurveTo(s * 0.18, -s * 0.52, -s * 0.15, -s * 0.48);
    ctx.closePath();
    ctx.fillStyle = this.bodyColor1;
    ctx.globalAlpha = 0.8;
    ctx.fill();
    ctx.globalAlpha = 1;

    // ── Aleta anal (inferior) ──────────────────────────────────────────────
    ctx.beginPath();
    ctx.moveTo(-s * 0.1, s * 0.45);
    ctx.quadraticCurveTo(s * 0.15, s * 0.85, s * 0.35, s * 0.45);
    ctx.quadraticCurveTo(s * 0.1,  s * 0.5, -s * 0.1, s * 0.45);
    ctx.closePath();
    ctx.fillStyle = this.bodyColor1;
    ctx.globalAlpha = 0.7;
    ctx.fill();
    ctx.globalAlpha = 1;

    // ── Aleta pectoral ─────────────────────────────────────────────────────
    ctx.beginPath();
    ctx.ellipse(s * 0.12, s * 0.18, s * 0.3, s * 0.15, Math.PI / 4, 0, Math.PI * 2);
    ctx.fillStyle = this.bodyColor2;
    ctx.globalAlpha = 0.65;
    ctx.fill();
    ctx.globalAlpha = 1;

    // ── Ojo ───────────────────────────────────────────────────────────────
    ctx.beginPath();
    ctx.arc(s * 0.56, -s * 0.07, s * 0.14, 0, Math.PI * 2);
    ctx.fillStyle = '#e8f4f8';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 0.58, -s * 0.07, s * 0.085, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 0.61, -s * 0.10, s * 0.035, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fill();

    ctx.restore();
  }
}

const fishes = [
  new Fish( 140, 170, 24, 1.0,  1),
  new Fish( 320, 220, 19, 0.85,-1),
  new Fish( 520, 155, 28, 1.2,  1),
  new Fish( 720, 205, 21, 0.95,-1),
  new Fish( 860, 260, 25, 1.1,  1),
  new Fish( 210, 285, 17, 0.75, 1),
  new Fish( 660, 145, 30, 1.4, -1),
  new Fish(  55, 310, 16, 0.65,-1),
  new Fish( 440, 240, 22, 1.05, 1),
  new Fish( 780, 180, 26, 1.15,-1),
];

// ── Fondo ──────────────────────────────────────────────────────────────────
function drawBackground(t) {
  // Gradiente de agua profunda
  const gSky = ctx.createLinearGradient(0, 0, 0, H);
  gSky.addColorStop(0,    '#020c1a');
  gSky.addColorStop(0.25, '#051e36');
  gSky.addColorStop(0.55, '#073456');
  gSky.addColorStop(1,    '#041222');
  ctx.fillStyle = gSky;
  ctx.fillRect(0, 0, W, H);

  // Cáusticas (luz filtrada desde la superficie)
  ctx.save();
  caustics.forEach((c, i) => {
    const alpha = 0.025 + 0.018 * Math.sin(t * 0.7 + c.phase);
    const sz    = c.size * (1 + 0.12 * Math.sin(t * 0.5 + i));
    const gRay  = ctx.createRadialGradient(c.x, 0, 0, c.x, H * 0.5, sz * 3);
    gRay.addColorStop(0,   `rgba(130,210,255,${alpha})`);
    gRay.addColorStop(0.5, `rgba(80,170,230,${alpha * 0.4})`);
    gRay.addColorStop(1,   'rgba(80,170,230,0)');
    ctx.beginPath();
    ctx.moveTo(c.x - sz * 0.3, 0);
    ctx.lineTo(c.x + sz * 0.3, 0);
    ctx.lineTo(c.x + sz * 1.2, H * 0.85);
    ctx.lineTo(c.x - sz * 1.2, H * 0.85);
    ctx.closePath();
    ctx.fillStyle = gRay;
    ctx.fill();
  });
  ctx.restore();

  // Niebla submarina (profundidad)
  const gFog = ctx.createLinearGradient(0, 0, W, 0);
  gFog.addColorStop(0,   'rgba(2,15,35,0.4)');
  gFog.addColorStop(0.5, 'rgba(2,15,35,0)');
  gFog.addColorStop(1,   'rgba(2,15,35,0.4)');
  ctx.fillStyle = gFog;
  ctx.fillRect(0, 0, W, H);

  // Suelo marino — roca y arena oscura
  const gRock = ctx.createLinearGradient(0, H - 90, 0, H);
  gRock.addColorStop(0, '#2a3a4a');
  gRock.addColorStop(0.4, '#1e2d3d');
  gRock.addColorStop(1,   '#111a24');
  ctx.fillStyle = gRock;
  ctx.fillRect(0, H - 90, W, 90);

  // Piedras/rocas
  const rocks = [
    { x: 40,  y: H - 85, rx: 38, ry: 18 },
    { x: 190, y: H - 80, rx: 55, ry: 22 },
    { x: 380, y: H - 78, rx: 45, ry: 17 },
    { x: 570, y: H - 82, rx: 60, ry: 20 },
    { x: 760, y: H - 79, rx: 50, ry: 18 },
    { x: 920, y: H - 83, rx: 40, ry: 16 },
  ];
  rocks.forEach(r => {
    const gR = ctx.createRadialGradient(r.x - r.rx * 0.3, r.y - r.ry * 0.4, 2, r.x, r.y, r.rx);
    gR.addColorStop(0, '#3d5060');
    gR.addColorStop(1, '#1a2530');
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, r.rx, r.ry, 0, 0, Math.PI * 2);
    ctx.fillStyle = gR;
    ctx.fill();
  });

  // Textura de ondas en el fondo (arena)
  ctx.strokeStyle = 'rgba(80,120,160,0.15)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    ctx.moveTo(0, H - 60 + i * 7);
    for (let x = 0; x < W; x += 40) {
      ctx.quadraticCurveTo(
        x + 20, H - 60 + i * 7 + Math.sin(x * 0.04 + t * 0.25 + i) * 3,
        x + 40, H - 60 + i * 7
      );
    }
    ctx.stroke();
  }
}

function drawSeaweed(sw, t) {
  const segH = sw.height / sw.segments;
  let cx = sw.x, cy = H - 88;
  ctx.lineWidth = sw.thickness;
  ctx.strokeStyle = sw.color;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  for (let s = 0; s < sw.segments; s++) {
    const sway = Math.sin(t * 0.75 + sw.phase + s * 0.45) * 7;
    cx += sway;
    cy -= segH;
    ctx.lineTo(cx, cy);
  }
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(cx, cy - 7, 8, 4, Math.sin(t * 0.75 + sw.phase) * 0.5, 0, Math.PI * 2);
  ctx.fillStyle = sw.color;
  ctx.fill();
}

function drawCoral(c, t) {
  const base = { x: c.x, y: H - 88 };

  if (c.type === 'branch') {
    function branch(x, y, angle, len, depth) {
      if (depth === 0 || len < 3) return;
      const ex = x + Math.cos(angle) * len;
      const ey = y - Math.sin(angle) * len;
      // Gradiente del tallo al extremo: más claro en las puntas
      const g = ctx.createLinearGradient(x, y, ex, ey);
      g.addColorStop(0, c.color);
      g.addColorStop(1, c.color + 'cc');
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(ex, ey);
      ctx.lineWidth = Math.max(0.8, depth * 1.3);
      ctx.strokeStyle = g;
      ctx.stroke();
      // Pólipo en las puntas
      if (depth === 1) {
        ctx.beginPath();
        ctx.arc(ex, ey, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = c.color + 'dd';
        ctx.fill();
      }
      const sway = Math.sin(t * 0.55 + depth) * 0.07;
      branch(ex, ey, angle - 0.48 + sway, len * 0.68, depth - 1);
      branch(ex, ey, angle + 0.48 + sway, len * 0.68, depth - 1);
    }
    branch(base.x, base.y, Math.PI / 2, c.h * 0.52, 6);

  } else if (c.type === 'fan') {
    const sway = Math.sin(t * 0.65) * 0.07;
    ctx.save();
    ctx.translate(base.x, base.y);
    ctx.rotate(sway);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -c.h);
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = c.color;
    ctx.stroke();
    for (let a = -0.65; a <= 0.65; a += 0.10) {
      ctx.beginPath();
      ctx.moveTo(0, -c.h * 0.28);
      ctx.lineTo(Math.sin(a) * c.h * 0.72, -c.h * 0.28 - Math.cos(a) * c.h * 0.72);
      ctx.lineWidth = 1.2;
      ctx.strokeStyle = c.color;
      ctx.globalAlpha = 0.65;
      ctx.stroke();
    }
    for (let r = 0.25; r <= 0.95; r += 0.18) {
      ctx.beginPath();
      ctx.arc(0, -c.h * 0.28, c.h * 0.72 * r, -Math.PI / 2 - 0.65, -Math.PI / 2 + 0.65);
      ctx.lineWidth = 0.8;
      ctx.globalAlpha = 0.35;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

  } else if (c.type === 'round') {
    const gC = ctx.createRadialGradient(base.x - 6, base.y - c.h * 0.65, 3, base.x, base.y - c.h / 2, c.w * 0.9);
    gC.addColorStop(0, c.color + 'ff');
    gC.addColorStop(1, c.color + '88');
    ctx.beginPath();
    ctx.ellipse(base.x, base.y - c.h / 2, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = gC;
    ctx.fill();
    // textura de pólipos
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    for (let dx = -c.w / 2 + 6; dx < c.w / 2; dx += 7) {
      for (let dy = -c.h + 7; dy < 0; dy += 7) {
        if (Math.pow(dx / (c.w / 2), 2) + Math.pow((dy + c.h / 2) / (c.h / 2), 2) < 1) {
          ctx.beginPath();
          ctx.arc(base.x + dx, base.y + dy, 1.8, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
    // brillo superior
    ctx.beginPath();
    ctx.ellipse(base.x - c.w * 0.15, base.y - c.h * 0.72, c.w * 0.22, c.h * 0.14, -0.4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180,240,255,0.18)';
    ctx.fill();
  }
}

function drawBubbles(t) {
  bubbles.forEach(b => {
    b.wobble += b.wobbleSpeed;
    b.y -= b.speed;
    b.x += Math.sin(b.wobble) * 0.5;
    if (b.y < -15) { b.y = H + 15; b.x = Math.random() * W; }

    ctx.save();
    // sombra de burbuja
    const gB = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.1, b.x, b.y, b.r);
    gB.addColorStop(0,   'rgba(200,240,255,0.18)');
    gB.addColorStop(0.6, 'rgba(100,200,255,0.08)');
    gB.addColorStop(1,   'rgba(100,200,255,0)');
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = gB;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(180,230,255,0.45)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // brillo
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.28, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fill();
    ctx.restore();
  });
}

function drawParticles(t) {
  particles.forEach(p => {
    p.x += p.vx + Math.sin(t * 0.3 + p.y * 0.02) * 0.12;
    p.y += p.vy;
    if (p.y < -5)    { p.y = H + 5;  p.x = Math.random() * W; }
    if (p.x > W + 5) { p.x = -5; }
    if (p.x < -5)    { p.x = W + 5; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(160,220,255,${p.alpha * (0.7 + 0.3 * Math.sin(t + p.x))})`;
    ctx.fill();
  });
}

// ── Viñeta final ───────────────────────────────────────────────────────────
function drawVignette() {
  const vign = ctx.createRadialGradient(W / 2, H / 2, H * 0.28, W / 2, H / 2, H * 0.9);
  vign.addColorStop(0, 'rgba(0,0,0,0)');
  vign.addColorStop(1, 'rgba(0,5,15,0.65)');
  ctx.fillStyle = vign;
  ctx.fillRect(0, 0, W, H);
}

let t = 0;

function loop() {
  t += 0.016;

  drawBackground(t);
  drawParticles(t);

  seaweeds.forEach(sw => drawSeaweed(sw, t));
  corals.forEach(c => drawCoral(c, t));

  fishes.forEach(f => { f.update(); f.draw(ctx); });
  drawBubbles(t);
  drawVignette();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
