<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrecife de Coral — El Corán Azul</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
  canvas { display: block; max-width: 100%; max-height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 960, H = 540;
canvas.width = W;
canvas.height = H;

// ── Burbujas ──────────────────────────────────────────────────────────────
const bubbles = Array.from({length: 40}, () => ({
  x: Math.random() * W,
  y: H + Math.random() * 60,
  r: 2 + Math.random() * 5,
  speed: 0.4 + Math.random() * 0.8,
  wobble: Math.random() * Math.PI * 2,
  wobbleSpeed: 0.02 + Math.random() * 0.03
}));

// ── Corales ───────────────────────────────────────────────────────────────
const corals = [
  { x: 80,  h: 100, w: 22, color: '#ff6b6b', type: 'branch' },
  { x: 160, h: 70,  w: 30, color: '#ff9f43', type: 'fan'    },
  { x: 260, h: 90,  w: 20, color: '#ff6b6b', type: 'branch' },
  { x: 340, h: 55,  w: 35, color: '#feca57', type: 'round'  },
  { x: 440, h: 110, w: 18, color: '#ee5a24', type: 'branch' },
  { x: 520, h: 65,  w: 28, color: '#ff9f43', type: 'fan'    },
  { x: 620, h: 95,  w: 21, color: '#ff6b6b', type: 'branch' },
  { x: 700, h: 50,  w: 32, color: '#feca57', type: 'round'  },
  { x: 800, h: 80,  w: 19, color: '#ee5a24', type: 'branch' },
  { x: 880, h: 75,  w: 25, color: '#ff9f43', type: 'fan'    },
];

// ── Peces con grandes colas azules ────────────────────────────────────────
class Fish {
  constructor(x, y, size, speed, dir) {
    this.x = x;
    this.y = y;
    this.baseY = y;
    this.size = size;
    this.speed = speed;
    this.dir = dir;       // 1 = derecha, -1 = izquierda
    this.t = Math.random() * Math.PI * 2;
    this.tailAngle = 0;
    this.bodyColors = [
      ['#f9ca24', '#f0932b'],
      ['#6ab04c', '#badc58'],
      ['#eb4d4b', '#ff7979'],
      ['#22a6b3', '#7ed6df'],
      ['#be2edd', '#e056fd'],
    ];
    const ci = Math.floor(Math.random() * this.bodyColors.length);
    this.bodyColor1 = this.bodyColors[ci][0];
    this.bodyColor2 = this.bodyColors[ci][1];
  }

  update() {
    this.t += 0.04;
    this.tailAngle = Math.sin(this.t * 3) * 0.5;
    this.x += this.speed * this.dir;
    this.y = this.baseY + Math.sin(this.t) * 15;

    if (this.x > W + 100) { this.x = -100; this.dir = 1; }
    if (this.x < -100)    { this.x = W + 100; this.dir = -1; }
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    if (this.dir === -1) ctx.scale(-1, 1);

    const s = this.size;

    // ── Cola grande AZUL ──────────────────────────────────────────────────
    const tailSway = this.tailAngle;
    const tailBaseX = -s * 0.6;
    const tailTipX  = -s * 2.0;
    const tailSpread = s * 1.4;

    // lóbulo superior de la cola
    ctx.beginPath();
    ctx.moveTo(tailBaseX,  s * 0.2);
    ctx.quadraticCurveTo(
      tailTipX - s * 0.3, -tailSpread * 0.3 + tailSway * s * 2,
      tailTipX,           -tailSpread + tailSway * s * 2
    );
    ctx.quadraticCurveTo(tailTipX + s * 0.4, tailSway * s * 1.5, tailBaseX, -s * 0.15);
    ctx.closePath();
    const gT1 = ctx.createLinearGradient(tailBaseX, 0, tailTipX, 0);
    gT1.addColorStop(0, '#1e90ff');
    gT1.addColorStop(1, '#00bfff');
    ctx.fillStyle = gT1;
    ctx.fill();

    // lóbulo inferior de la cola
    ctx.beginPath();
    ctx.moveTo(tailBaseX, -s * 0.2);
    ctx.quadraticCurveTo(
      tailTipX - s * 0.3, tailSpread * 0.3 + tailSway * s * 2,
      tailTipX,            tailSpread + tailSway * s * 2
    );
    ctx.quadraticCurveTo(tailTipX + s * 0.4, tailSway * s * 1.5, tailBaseX, s * 0.15);
    ctx.closePath();
    const gT2 = ctx.createLinearGradient(tailBaseX, 0, tailTipX, 0);
    gT2.addColorStop(0, '#1e90ff');
    gT2.addColorStop(1, '#00bfff');
    ctx.fillStyle = gT2;
    ctx.fill();

    // detalle de nervios de cola
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 0.8;
    for (let i = 0; i < 5; i++) {
      const frac = i / 4;
      ctx.beginPath();
      ctx.moveTo(tailBaseX, 0);
      ctx.lineTo(
        tailTipX,
        (-tailSpread + tailSpread * 2 * frac) + tailSway * s * 2
      );
      ctx.stroke();
    }

    // ── Cuerpo ─────────────────────────────────────────────────────────────
    const gBody = ctx.createRadialGradient(s * 0.1, -s * 0.1, s * 0.05, 0, 0, s);
    gBody.addColorStop(0, this.bodyColor2);
    gBody.addColorStop(1, this.bodyColor1);
    ctx.beginPath();
    ctx.ellipse(0, 0, s, s * 0.55, 0, 0, Math.PI * 2);
    ctx.fillStyle = gBody;
    ctx.fill();

    // vientre claro
    ctx.beginPath();
    ctx.ellipse(s * 0.05, s * 0.12, s * 0.5, s * 0.22, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fill();

    // ── Aleta dorsal ───────────────────────────────────────────────────────
    ctx.beginPath();
    ctx.moveTo(-s * 0.2,  -s * 0.5);
    ctx.quadraticCurveTo(s * 0.3, -s * 1.1, s * 0.5, -s * 0.5);
    ctx.quadraticCurveTo(s * 0.2, -s * 0.55, -s * 0.2, -s * 0.5);
    ctx.closePath();
    ctx.fillStyle = '#1e90ff';
    ctx.globalAlpha = 0.85;
    ctx.fill();
    ctx.globalAlpha = 1;

    // ── Aleta pectoral ─────────────────────────────────────────────────────
    ctx.beginPath();
    ctx.ellipse(s * 0.1, s * 0.2, s * 0.35, s * 0.18, Math.PI / 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(30,144,255,0.6)';
    ctx.fill();

    // ── Ojo ───────────────────────────────────────────────────────────────
    ctx.beginPath();
    ctx.arc(s * 0.55, -s * 0.08, s * 0.15, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 0.57, -s * 0.08, s * 0.09, 0, Math.PI * 2);
    ctx.fillStyle = '#222';
    ctx.fill();
    // brillo del ojo
    ctx.beginPath();
    ctx.arc(s * 0.60, -s * 0.12, s * 0.04, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    ctx.restore();
  }
}

const fishes = [
  new Fish(120, 180, 22, 1.1,  1),
  new Fish(300, 230, 18, 0.9, -1),
  new Fish(500, 160, 26, 1.3,  1),
  new Fish(700, 210, 20, 1.0, -1),
  new Fish(850, 270, 24, 1.2,  1),
  new Fish(200, 290, 16, 0.8,  1),
  new Fish(650, 150, 28, 1.5, -1),
  new Fish( 50, 320, 15, 0.7, -1),
];

// ── Plantas marinas ────────────────────────────────────────────────────────
const seaweeds = Array.from({length: 14}, (_, i) => ({
  x: 30 + i * 68 + Math.random() * 30,
  segments: 5 + Math.floor(Math.random() * 4),
  height: 40 + Math.random() * 50,
  color: Math.random() > 0.5 ? '#27ae60' : '#2ecc71',
  phase: Math.random() * Math.PI * 2
}));

// ── El Corán azul ─────────────────────────────────────────────────────────
const quran = {
  x: W / 2 - 45,
  y: H - 180,
  w: 90,
  h: 120,
  angle: 0,
  t: 0
};

function drawBackground(t) {
  // Gradiente de agua
  const gSky = ctx.createLinearGradient(0, 0, 0, H);
  gSky.addColorStop(0,   '#0a2a6e');
  gSky.addColorStop(0.4, '#0d4f8c');
  gSky.addColorStop(1,   '#063047');
  ctx.fillStyle = gSky;
  ctx.fillRect(0, 0, W, H);

  // Rayos de luz bajo el agua
  ctx.save();
  for (let i = 0; i < 8; i++) {
    const lx = 80 + i * 120;
    const alpha = 0.04 + 0.03 * Math.sin(t * 0.5 + i);
    const gRay = ctx.createLinearGradient(lx, 0, lx + 60, H * 0.8);
    gRay.addColorStop(0, `rgba(180,230,255,${alpha})`);
    gRay.addColorStop(1, 'rgba(180,230,255,0)');
    ctx.beginPath();
    ctx.moveTo(lx, 0);
    ctx.lineTo(lx + 70, H * 0.8);
    ctx.lineTo(lx - 10, H * 0.8);
    ctx.closePath();
    ctx.fillStyle = gRay;
    ctx.fill();
  }
  ctx.restore();

  // Fondo arenoso
  const gSand = ctx.createLinearGradient(0, H - 80, 0, H);
  gSand.addColorStop(0, '#c8a96e');
  gSand.addColorStop(1, '#a0804a');
  ctx.fillStyle = gSand;
  ctx.fillRect(0, H - 80, W, 80);

  // Textura de arena — ondas
  ctx.strokeStyle = 'rgba(255,220,140,0.25)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 10; i++) {
    ctx.beginPath();
    ctx.moveTo(0, H - 65 + i * 6);
    for (let x = 0; x < W; x += 30) {
      ctx.quadraticCurveTo(
        x + 15, H - 65 + i * 6 + Math.sin(x * 0.05 + t * 0.3 + i) * 3,
        x + 30, H - 65 + i * 6
      );
    }
    ctx.stroke();
  }
}

function drawSeaweed(sw, t) {
  const segH = sw.height / sw.segments;
  let cx = sw.x, cy = H - 80;

  ctx.lineWidth = 3;
  ctx.strokeStyle = sw.color;
  ctx.beginPath();
  ctx.moveTo(cx, cy);

  for (let s = 0; s < sw.segments; s++) {
    const sway = Math.sin(t * 0.8 + sw.phase + s * 0.5) * 6;
    cx += sway;
    cy -= segH;
    ctx.lineTo(cx, cy);
  }
  ctx.stroke();

  // hoja superior
  ctx.beginPath();
  ctx.ellipse(cx, cy - 8, 10, 5, Math.sin(t * 0.8 + sw.phase) * 0.5, 0, Math.PI * 2);
  ctx.fillStyle = sw.color;
  ctx.fill();
}

function drawCoral(c, t) {
  const base = { x: c.x, y: H - 80 };

  if (c.type === 'branch') {
    function branch(x, y, angle, len, depth) {
      if (depth === 0 || len < 4) return;
      const ex = x + Math.cos(angle) * len;
      const ey = y - Math.sin(angle) * len;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(ex, ey);
      ctx.lineWidth = depth * 1.5;
      ctx.strokeStyle = c.color;
      ctx.stroke();
      const sway = Math.sin(t * 0.6 + depth) * 0.08;
      branch(ex, ey, angle - 0.5 + sway, len * 0.7, depth - 1);
      branch(ex, ey, angle + 0.5 + sway, len * 0.7, depth - 1);
    }
    branch(base.x, base.y, Math.PI / 2, c.h * 0.5, 5);

  } else if (c.type === 'fan') {
    const sway = Math.sin(t * 0.7) * 0.08;
    ctx.save();
    ctx.translate(base.x, base.y);
    ctx.rotate(sway);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -c.h);
    ctx.lineWidth = 3;
    ctx.strokeStyle = c.color;
    ctx.stroke();
    // abanico
    for (let a = -0.6; a <= 0.6; a += 0.12) {
      ctx.beginPath();
      ctx.moveTo(0, -c.h * 0.3);
      ctx.lineTo(
        Math.sin(a) * c.h * 0.7,
        -c.h * 0.3 - Math.cos(a) * c.h * 0.7
      );
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = c.color;
      ctx.globalAlpha = 0.7;
      ctx.stroke();
    }
    // red de abanico
    for (let r = 0.3; r <= 0.9; r += 0.2) {
      ctx.beginPath();
      ctx.arc(0, -c.h * 0.3, c.h * 0.7 * r, -Math.PI / 2 - 0.6, -Math.PI / 2 + 0.6);
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.4;
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

  } else if (c.type === 'round') {
    ctx.beginPath();
    ctx.ellipse(base.x, base.y - c.h / 2, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
    const gC = ctx.createRadialGradient(base.x - 5, base.y - c.h * 0.7, 3, base.x, base.y - c.h / 2, c.w);
    gC.addColorStop(0, '#fff9c4');
    gC.addColorStop(1, c.color);
    ctx.fillStyle = gC;
    ctx.fill();
    // textura punteada
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    for (let dx = -c.w / 2 + 6; dx < c.w / 2; dx += 8) {
      for (let dy = -c.h + 8; dy < 0; dy += 8) {
        if (Math.pow(dx / (c.w / 2), 2) + Math.pow((dy + c.h / 2) / (c.h / 2), 2) < 1) {
          ctx.beginPath();
          ctx.arc(base.x + dx, base.y + dy, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }
}

function drawQuran(t) {
  const q = quran;
  q.t = t;
  q.angle = Math.sin(t * 0.4) * 0.04;

  ctx.save();
  ctx.translate(q.x + q.w / 2, q.y + q.h / 2);
  ctx.rotate(q.angle);

  // Sombra del libro
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur  = 18;
  ctx.shadowOffsetX = 4;
  ctx.shadowOffsetY = 6;

  // Portada trasera (lomo)
  const lomoW = 14;
  ctx.beginPath();
  ctx.rect(-q.w / 2 - lomoW, -q.h / 2, lomoW, q.h);
  const gLomo = ctx.createLinearGradient(-q.w / 2 - lomoW, 0, -q.w / 2, 0);
  gLomo.addColorStop(0, '#00008b');
  gLomo.addColorStop(1, '#0047ab');
  ctx.fillStyle = gLomo;
  ctx.fill();

  // Portada principal (azul)
  ctx.beginPath();
  ctx.rect(-q.w / 2, -q.h / 2, q.w, q.h);
  const gCover = ctx.createLinearGradient(-q.w / 2, -q.h / 2, q.w / 2, q.h / 2);
  gCover.addColorStop(0, '#1565c0');
  gCover.addColorStop(0.5, '#1e88e5');
  gCover.addColorStop(1, '#0d47a1');
  ctx.fillStyle = gCover;
  ctx.fill();

  ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;

  // Marco decorativo dorado en la portada
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 1.5;
  const pad = 7;
  ctx.strokeRect(-q.w / 2 + pad, -q.h / 2 + pad, q.w - pad * 2, q.h - pad * 2);
  // esquinas decorativas
  const cp = 14;
  [[-1, -1], [1, -1], [1, 1], [-1, 1]].forEach(([sx, sy]) => {
    const ox = sx * (q.w / 2 - pad);
    const oy = sy * (q.h / 2 - pad);
    ctx.beginPath();
    ctx.moveTo(ox + sx * cp, oy);
    ctx.lineTo(ox, oy);
    ctx.lineTo(ox, oy + sy * cp);
    ctx.stroke();
  });

  // Estrella de ocho puntas (ornamento islámico) — dorada
  ctx.save();
  ctx.fillStyle = '#ffd700';
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 0.8;
  const starR = 16;
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
    const r = i % 2 === 0 ? starR : starR * 0.42;
    i === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r)
            : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Texto "القرآن الكريم" (El Corán Noble)
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 11px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('القرآن الكريم', 0, q.h / 2 - 24);

  // Páginas (lateral derecho)
  ctx.beginPath();
  ctx.rect(q.w / 2, -q.h / 2 + 2, 5, q.h - 4);
  const gPages = ctx.createLinearGradient(q.w / 2, 0, q.w / 2 + 5, 0);
  gPages.addColorStop(0, '#e8e8e8');
  gPages.addColorStop(1, '#fff');
  ctx.fillStyle = gPages;
  ctx.fill();
  // líneas de páginas
  ctx.strokeStyle = 'rgba(180,180,180,0.5)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 20; i++) {
    const py = -q.h / 2 + 4 + i * ((q.h - 8) / 20);
    ctx.beginPath();
    ctx.moveTo(q.w / 2, py);
    ctx.lineTo(q.w / 2 + 5, py);
    ctx.stroke();
  }

  // Reflejo de luz en portada
  ctx.beginPath();
  ctx.rect(-q.w / 2 + 3, -q.h / 2 + 3, q.w * 0.35, q.h * 0.4);
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fill();

  ctx.restore();
}

function drawBubbles(t) {
  bubbles.forEach(b => {
    b.wobble += b.wobbleSpeed;
    b.y -= b.speed;
    b.x += Math.sin(b.wobble) * 0.6;
    if (b.y < -20) { b.y = H + 20; b.x = Math.random() * W; }

    ctx.save();
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(200,240,255,0.55)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // brillo
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.35, b.y - b.r * 0.35, b.r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fill();
    ctx.restore();
  });
}

// ── Partículas de plancton ────────────────────────────────────────────────
const plankton = Array.from({length: 60}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: 1 + Math.random() * 2,
  speed: 0.2 + Math.random() * 0.4,
  angle: Math.random() * Math.PI * 2
}));

function drawPlankton(t) {
  plankton.forEach(p => {
    p.angle += 0.02 + Math.random() * 0.01;
    p.x += Math.cos(p.angle) * p.speed;
    p.y += Math.sin(p.angle) * p.speed * 0.5 - 0.1;
    if (p.x > W + 10) p.x = -10;
    if (p.y < -10) p.y = H + 10;
    if (p.x < -10) p.x = W + 10;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(150,220,255,${0.2 + Math.sin(t + p.x) * 0.1})`;
    ctx.fill();
  });
}

let t = 0;

function loop() {
  t += 0.016;

  drawBackground(t);
  drawPlankton(t);

  seaweeds.forEach(sw => drawSeaweed(sw, t));
  corals.forEach(c => drawCoral(c, t));

  drawQuran(t);

  fishes.forEach(f => { f.update(); f.draw(ctx); });
  drawBubbles(t);

  // Viñeta oscura en bordes
  const vign = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.85);
  vign.addColorStop(0, 'rgba(0,0,0,0)');
  vign.addColorStop(1, 'rgba(0,0,10,0.55)');
  ctx.fillStyle = vign;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
