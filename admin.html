<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de administración — Inés Sánchez Beauty Concept</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="contract-pdf.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&family=Jost:wght@300;400;500&display=swap');
:root{--negro:#1a1410;--dorado:#b8972a;--dorado-claro:#d4af37;--crema:#faf7f2;--crema-o:#f0ebe1;--gris:#7a6f65;--borde:#ddd5c8;--ok:#1a7a3a;--err:#c0392b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Jost',sans-serif;background:var(--crema);color:var(--negro);min-height:100vh;}
.hidden{display:none!important;}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:#fff;border-radius:8px;padding:40px 36px;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:360px;width:100%;text-align:center;}
.login-box h1{font-family:'Cormorant Garamond',serif;font-size:1.4rem;letter-spacing:.08em;margin-bottom:4px;}
.login-box .sub{font-size:.7rem;color:var(--gris);letter-spacing:.15em;text-transform:uppercase;margin-bottom:24px;}
.login-box input{width:100%;border:1px solid var(--borde);padding:12px 14px;border-radius:5px;font-size:.9rem;margin-bottom:12px;font-family:'Jost',sans-serif;}
.login-box button{width:100%;padding:13px;background:var(--negro);color:#fff;border:none;border-radius:5px;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;}
.login-box button:hover{background:var(--dorado);}
.login-err{color:var(--err);font-size:.8rem;margin-top:10px;min-height:1.2em;}
/* SHELL */
header.top{background:var(--negro);color:#fff;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;}
header.top .tit{font-family:'Cormorant Garamond',serif;font-size:1.15rem;letter-spacing:.1em;}
header.top .tit span{color:var(--dorado-claro);}
header.top button{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 14px;border-radius:4px;font-size:.75rem;letter-spacing:.08em;cursor:pointer;}
header.top button:hover{border-color:var(--dorado-claro);color:var(--dorado-claro);}
main{max-width:1200px;margin:0 auto;padding:28px 24px 60px;}
.card{background:#fff;border-radius:8px;padding:22px 24px;margin-bottom:24px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.card h2{font-family:'Cormorant Garamond',serif;font-size:1.15rem;letter-spacing:.05em;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--borde);}
.filtros{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end;}
.filtros .campo{display:flex;flex-direction:column;gap:4px;}
.filtros label{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--gris);}
.filtros input,.filtros select{border:1px solid var(--borde);padding:8px 10px;border-radius:4px;font-family:'Jost',sans-serif;font-size:.85rem;}
.filtros button{padding:9px 16px;background:var(--crema-o);border:1px solid var(--borde);border-radius:4px;font-size:.78rem;cursor:pointer;}
.filtros button:hover{border-color:var(--dorado);}
table.tbl{width:100%;border-collapse:collapse;font-size:.83rem;}
table.tbl th{text-align:left;padding:9px 10px;background:var(--crema-o);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--gris);border-bottom:1px solid var(--borde);white-space:nowrap;}
table.tbl td{padding:9px 10px;border-bottom:1px solid var(--borde);vertical-align:top;}
table.tbl tr:hover td{background:#fbf9f5;}
.badge{display:inline-block;padding:3px 9px;border-radius:10px;font-size:.7rem;font-weight:500;}
.badge.si{background:#eafaf0;color:var(--ok);}
.badge.no{background:#faf0f0;color:var(--err);}
.estado-vacio{padding:30px;text-align:center;color:var(--gris);font-style:italic;}
.btn-enviar{background:var(--dorado);color:#fff;border:none;padding:7px 12px;border-radius:4px;font-size:.75rem;cursor:pointer;white-space:nowrap;}
.btn-enviar:hover:not(:disabled){background:var(--dorado-claro);}
.btn-enviar:disabled{background:var(--borde);cursor:not-allowed;}
.msg-top{padding:10px 14px;border-radius:5px;font-size:.82rem;margin-bottom:14px;display:none;}
.msg-top.err{background:#fdf0f0;border:1px solid #f0c0c0;color:var(--err);display:block;}
.msg-top.ok{background:#f0fdf4;border:1px solid #a8e0b8;color:var(--ok);display:block;}
/* PRECIOS */
.precios-grupo{margin-bottom:20px;}
.precios-grupo h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gris);margin-bottom:10px;}
.precio-fila{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--crema-o);}
.precio-fila .nom{flex:1;font-size:.86rem;}
.precio-fila .nom .desc{display:block;font-size:.75rem;color:var(--gris);margin-top:2px;}
.precio-fila .campo-pre{display:flex;align-items:center;gap:5px;}
.precio-fila input[type=number]{width:80px;border:1px solid var(--borde);padding:7px 8px;border-radius:4px;font-family:'Jost',sans-serif;font-size:.85rem;text-align:right;}
.precio-fila .campo-pre span{font-size:.8rem;color:var(--gris);}
.precios-fuente{font-size:.75rem;color:var(--gris);margin-bottom:14px;}
.btn-guardar{background:var(--negro);color:#fff;border:none;padding:11px 22px;border-radius:5px;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-top:8px;}
.btn-guardar:hover:not(:disabled){background:var(--dorado);}
.btn-guardar:disabled{background:var(--borde);cursor:not-allowed;}
/* CONTRATO (offscreen, para regenerar el PDF — copiado de index.html) */
#contratoImprimible{position:fixed;left:0;top:0;width:210mm;background:#fff;font-family:Georgia,serif;font-size:10pt;color:#000;margin:0;padding:0;z-index:-1;opacity:0;pointer-events:none;}
#contratoImprimible .cp-page{width:210mm;min-height:297mm;padding:18mm 18mm 22mm;position:relative;background:#fff;box-sizing:border-box;}
#contratoImprimible .cp-header{text-align:center;border-bottom:2pt solid #1a1410;padding-bottom:10mm;margin-bottom:8mm;}
#contratoImprimible .cp-logo{max-width:65mm;height:auto;}
#contratoImprimible .cp-subtitle{font-size:8pt;letter-spacing:.2em;text-transform:uppercase;color:#7a6f65;margin-top:4mm;}
#contratoImprimible .cp-titulo{font-size:16pt;font-weight:bold;text-align:center;margin-bottom:6mm;letter-spacing:.05em;}
#contratoImprimible .cp-parrafo{font-size:9pt;line-height:1.65;margin-bottom:4mm;text-align:justify;}
#contratoImprimible table{width:100%;border-collapse:collapse;margin-bottom:6mm;font-size:9pt;}
#contratoImprimible table caption{font-weight:bold;font-size:10pt;background:#1a1410;color:#fff;padding:3mm;text-align:center;letter-spacing:.08em;}
#contratoImprimible td,#contratoImprimible th{border:0.5pt solid #ddd5c8;padding:2mm 3mm;vertical-align:top;}
#contratoImprimible th{background:#f0ebe1;font-weight:bold;font-size:7.5pt;text-transform:uppercase;color:#7a6f65;white-space:nowrap;}
#contratoImprimible tr:nth-child(even) td{background:#faf7f2;}
#contratoImprimible .cp-total-row td{background:#1a1410!important;color:#fff!important;font-weight:bold;font-size:11pt;}
#contratoImprimible .cp-dep-row td{background:#f5f0e4!important;font-style:italic;font-size:8.5pt;}
#contratoImprimible .cp-nota{background:#faf3e0;border:0.5pt solid #b8972a;padding:3mm;font-size:8pt;color:#7a6f65;margin-bottom:5mm;border-radius:1mm;}
#contratoImprimible .cp-clausula{margin-bottom:3mm;}
#contratoImprimible .cp-clausula strong{display:inline-block;min-width:28mm;font-size:8.5pt;}
#contratoImprimible .cp-clausula span{font-size:8.5pt;color:#333;line-height:1.6;}
#contratoImprimible .firmas-grid{display:grid;grid-template-columns:1fr 1fr;gap:8mm;margin-top:8mm;}
#contratoImprimible .firma-box{border:0.5pt solid #ddd5c8;padding:4mm;background:#faf7f2;}
#contratoImprimible .firma-box .fb-tit{font-size:7.5pt;font-weight:bold;text-transform:uppercase;letter-spacing:.1em;color:#7a6f65;margin-bottom:2mm;}
#contratoImprimible .firma-box .fb-dat{font-size:8.5pt;margin-bottom:1.5mm;}
#contratoImprimible .firma-box .fb-img{width:100%;height:28mm;border-bottom:0.5pt solid #999;margin:3mm 0 1mm;display:flex;align-items:center;justify-content:center;}
#contratoImprimible .firma-box .fb-img img{max-height:26mm;max-width:100%;}
#contratoImprimible .firma-box .fb-fecha{font-size:7.5pt;color:#7a6f65;}
#contratoImprimible .cp-pie{position:absolute;bottom:10mm;left:18mm;right:18mm;text-align:center;font-size:7pt;color:#aaa;letter-spacing:.08em;border-top:0.5pt solid #eee;padding-top:2mm;}
</style>
</head>
<body>

<div id="contratoImprimible"></div>

<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <h1>INÉS SÁNCHEZ</h1>
    <div class="sub">Panel de administración</div>
    <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password">
    <button id="btnLogin" type="button">Entrar</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="dashboard" class="hidden">
  <header class="top">
    <div class="tit">INÉS SÁNCHEZ <span>· ADMIN</span></div>
    <button id="btnLogout" type="button">Cerrar sesión</button>
  </header>
  <main>
    <div id="msgTop" class="msg-top"></div>

    <section class="card">
      <h2>Contratos recibidos</h2>
      <div class="filtros">
        <div class="campo">
          <label>Boda desde</label>
          <input type="date" id="fDesde">
        </div>
        <div class="campo">
          <label>Boda hasta</label>
          <input type="date" id="fHasta">
        </div>
        <div class="campo">
          <label>PDF enviado</label>
          <select id="fEstado">
            <option value="">Todos</option>
            <option value="si">Enviado</option>
            <option value="no">No enviado</option>
          </select>
        </div>
        <button id="btnFiltrar" type="button">Filtrar</button>
        <button id="btnRecargar" type="button">Recargar</button>
      </div>
      <div id="tablaWrap"><div class="estado-vacio">Cargando contratos…</div></div>
    </section>

    <section class="card">
      <h2>Precios</h2>
      <div class="precios-fuente" id="preciosFuente"></div>
      <div id="preciosWrap"><div class="estado-vacio">Cargando precios…</div></div>
      <button class="btn-guardar" id="btnGuardarPrecios" type="button">Guardar precios</button>
    </section>
  </main>
</div>

<script>
var API_CONTRACTS = '/api/contracts';
var ALL_ROWS = [];

function getPassword(){ return localStorage.getItem('adminPassword') || ''; }
function setPassword(p){ localStorage.setItem('adminPassword', p); }
function clearPassword(){ localStorage.removeItem('adminPassword'); }

function showLogin(errMsg){
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginErr').textContent = errMsg || '';
}
function showDashboard(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
}

function intentarLogin(password){
  return fetch(API_CONTRACTS, { headers: { 'X-Admin-Password': password } })
    .then(function(r){
      if(r.status === 401) return { ok:false, unauthorized:true };
      return r.json().then(function(j){ j._status = r.status; return j; });
    });
}

document.getElementById('btnLogin').addEventListener('click', function(){
  var pass = document.getElementById('loginPassword').value;
  if(!pass) return;
  var btn = this; btn.disabled = true; btn.textContent = 'Comprobando…';
  intentarLogin(pass).then(function(j){
    btn.disabled = false; btn.textContent = 'Entrar';
    if(j.unauthorized){
      document.getElementById('loginErr').textContent = 'Contraseña incorrecta.';
      return;
    }
    if(!j.ok){
      document.getElementById('loginErr').textContent = 'Error: ' + (j.error || 'no se pudo conectar');
      return;
    }
    setPassword(pass);
    showDashboard();
    ALL_ROWS = j.rows || [];
    pintarContratos(ALL_ROWS);
    cargarPrecios();
  }).catch(function(err){
    btn.disabled = false; btn.textContent = 'Entrar';
    document.getElementById('loginErr').textContent = 'Error de conexión: ' + err.message;
  });
});

document.getElementById('loginPassword').addEventListener('keydown', function(e){
  if(e.key === 'Enter') document.getElementById('btnLogin').click();
});

document.getElementById('btnLogout').addEventListener('click', function(){
  clearPassword();
  showLogin();
});

function cargarContratos(){
  document.getElementById('tablaWrap').innerHTML = '<div class="estado-vacio">Cargando contratos…</div>';
  intentarLogin(getPassword()).then(function(j){
    if(j.unauthorized){ clearPassword(); showLogin('Tu sesión ha caducado, vuelve a entrar.'); return; }
    if(!j.ok){
      document.getElementById('tablaWrap').innerHTML = '<div class="estado-vacio">Error cargando contratos: '+(j.error||'')+'</div>';
      return;
    }
    ALL_ROWS = j.rows || [];
    pintarContratos(ALL_ROWS);
  }).catch(function(err){
    document.getElementById('tablaWrap').innerHTML = '<div class="estado-vacio">Error de conexión: '+err.message+'</div>';
  });
}

function fmtFecha(v){
  if(!v) return '—';
  var d = new Date(v);
  if(isNaN(d.getTime())) return String(v);
  return d.toLocaleDateString('es-ES');
}

// El Sheet guarda "Servicios novia"/"Combinados"/"Invitadas" como una
// única celda de texto (el doPost original las une con algún
// separador). Normaliza a array para poder reusar ContractPDF.
function toList(v){
  if(Array.isArray(v)) return v;
  if(typeof v === 'string' && v.trim()) return v.split(/\s*\|\s*|\s*;\s*|\n/).filter(Boolean);
  return [];
}

// El Sheet guarda Beauty Corner como texto tipo "Hotel: X | Dir: Y | notas"
// (así lo escribe el doPost real), no como JSON.
function parseBeautyCorner(v){
  if(!v) return null;
  if(typeof v === 'object') return v;
  var s = String(v).trim();
  if(!s) return null;
  var m = s.match(/^Hotel:\s*(.*?)\s*\|\s*Dir:\s*(.*?)(?:\s*\|\s*(.*))?$/);
  if(m) return { hotel: m[1]==='-'?'':m[1], dir: m[2]==='-'?'':m[2], notas: m[3]||'' };
  return { hotel: s };
}

var RENDERED_ROWS = [];

function pintarContratos(rows){
  RENDERED_ROWS = rows;
  if(!rows.length){
    document.getElementById('tablaWrap').innerHTML = '<div class="estado-vacio">No hay contratos que coincidan con el filtro.</div>';
    return;
  }
  var html = '<table class="tbl"><thead><tr>'
    + '<th>Novia</th><th>Fecha boda</th><th>Servicios</th><th>Total</th><th>Fecha registro</th><th>PDF enviado</th><th></th>'
    + '</tr></thead><tbody>';
  rows.forEach(function(row, i){
    var servicios = [].concat(toList(row['Servicios novia']), toList(row['Combinados']));
    var serviciosTxt = servicios.join(', ');
    var enviado = row['PDF enviado'] === 'Sí';
    html += '<tr>'
      + '<td>'+(row['Nombre']||'—')+'<br><span style="color:var(--gris);font-size:.78rem;">'+(row['Email']||'')+'</span></td>'
      + '<td>'+fmtFecha(row['Fecha boda'])+'</td>'
      + '<td style="max-width:260px;">'+(serviciosTxt||'—')+'</td>'
      + '<td>'+(row['Total (€)']!=null?row['Total (€)']+' €':'—')+'</td>'
      + '<td>'+fmtFecha(row['Fecha registro'])+'</td>'
      + '<td>'+(enviado
          ? '<span class="badge si">Sí — '+fmtFecha(row['Fecha envío PDF'])+'</span>'
          : '<span class="badge no">No</span>')+'</td>'
      + '<td><button class="btn-enviar" data-idx="'+i+'" '+(row['Email']?'':'disabled title="Sin email registrado"')+'>'+(enviado?'Reenviar':'Enviar')+' contrato</button></td>'
      + '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('tablaWrap').innerHTML = html;
}

document.getElementById('tablaWrap').addEventListener('click', function(e){
  var btn = e.target.closest('.btn-enviar');
  if(!btn || btn.disabled) return;
  var row = RENDERED_ROWS[Number(btn.getAttribute('data-idx'))];
  if(row) enviarContratoDesdeFila(row, btn);
});

function aplicarFiltros(){
  var desde = document.getElementById('fDesde').value;
  var hasta = document.getElementById('fHasta').value;
  var estado = document.getElementById('fEstado').value;
  var filtradas = ALL_ROWS.filter(function(row){
    if(desde || hasta){
      var f = new Date(row['Fecha boda']);
      if(isNaN(f.getTime())) return false;
      if(desde && f < new Date(desde)) return false;
      if(hasta && f > new Date(hasta+'T23:59:59')) return false;
    }
    if(estado === 'si' && row['PDF enviado'] !== 'Sí') return false;
    if(estado === 'no' && row['PDF enviado'] === 'Sí') return false;
    return true;
  });
  pintarContratos(filtradas);
}

document.getElementById('btnFiltrar').addEventListener('click', aplicarFiltros);
document.getElementById('btnRecargar').addEventListener('click', cargarContratos);

// =================== PRECIOS ===================
var PRECIOS_ACTUALES = null;

function cargarPrecios(){
  document.getElementById('preciosWrap').innerHTML = '<div class="estado-vacio">Cargando precios…</div>';
  fetch('/api/prices')
    .then(function(r){ return r.json(); })
    .then(function(j){
      if(!j.ok || !j.precios){
        document.getElementById('preciosWrap').innerHTML = '<div class="estado-vacio">No se pudieron cargar los precios.</div>';
        return;
      }
      PRECIOS_ACTUALES = j.precios;
      document.getElementById('preciosFuente').textContent = j.source === 'sheet'
        ? 'Origen: Google Sheet' + (j.updatedAt ? ' · última actualización ' + fmtFecha(j.updatedAt) : '')
        : 'Origen: valores por defecto (aún no se ha guardado ningún precio desde este panel)';
      pintarPrecios(PRECIOS_ACTUALES);
    })
    .catch(function(err){
      document.getElementById('preciosWrap').innerHTML = '<div class="estado-vacio">Error de conexión: '+err.message+'</div>';
    });
}

function filaPrecio(item, path, extra){
  return '<div class="precio-fila" data-path="'+path+'">'
    + '<div class="nom">'+item.nom+(item.desc?'<span class="desc">'+item.desc+'</span>':'')+'</div>'
    + '<div class="campo-pre"><input type="number" step="1" min="0" class="input-pre" value="'+item.pre+'"><span>€</span></div>'
    + (extra || '')
    + '</div>';
}

function pintarPrecios(p){
  var html = '';

  html += '<div class="precios-grupo"><h3>Servicios novia</h3>';
  p.serviciosNovia.forEach(function(item, i){ html += filaPrecio(item, 'serviciosNovia.'+i); });
  html += '</div>';

  html += '<div class="precios-grupo"><h3>Combinados novia</h3>';
  p.combinadosNovia.forEach(function(item, i){ html += filaPrecio(item, 'combinadosNovia.'+i); });
  html += '</div>';

  html += '<div class="precios-grupo"><h3>Servicios invitadas</h3>';
  p.serviciosInv.forEach(function(item, i){ html += filaPrecio(item, 'serviciosInv.'+i); });
  html += '</div>';

  html += '<div class="precios-grupo"><h3>Zonas de desplazamiento</h3>';
  p.zonas.forEach(function(item, i){
    var extra = '';
    if(item.bonif){
      extra = '<div class="campo-pre"><input type="number" step="1" min="0" class="input-bonif-m" value="'+item.bonif.m+'"><span>% (3–5 extras)</span></div>'
        + '<div class="campo-pre"><input type="number" step="1" min="0" class="input-bonif-t" value="'+item.bonif.t+'"><span>% (6+)</span></div>';
    }
    html += filaPrecio({ nom: item.et + ' — ' + item.nm, pre: item.pre }, 'zonas.'+i, extra);
  });
  html += '</div>';

  document.getElementById('preciosWrap').innerHTML = html;
}

document.getElementById('btnGuardarPrecios').addEventListener('click', function(){
  if(!PRECIOS_ACTUALES) return;
  var btn = this; btn.disabled = true; btn.textContent = 'Guardando…';

  var filas = document.querySelectorAll('#preciosWrap .precio-fila');
  filas.forEach(function(fila){
    var path = fila.getAttribute('data-path').split('.');
    var grupo = path[0], idx = Number(path[1]);
    var pre = Number(fila.querySelector('.input-pre').value) || 0;
    if(grupo === 'zonas'){
      PRECIOS_ACTUALES.zonas[idx].pre = pre;
      var im = fila.querySelector('.input-bonif-m');
      var it = fila.querySelector('.input-bonif-t');
      if(im && it) PRECIOS_ACTUALES.zonas[idx].bonif = { m: Number(im.value)||0, t: Number(it.value)||0 };
    } else {
      PRECIOS_ACTUALES[grupo][idx].pre = pre;
    }
  });

  fetch('/api/prices', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Password': getPassword() },
    body: JSON.stringify({ precios: PRECIOS_ACTUALES })
  })
  .then(function(r){ return r.json(); })
  .then(function(j){
    btn.disabled = false; btn.textContent = 'Guardar precios';
    var msg = document.getElementById('msgTop');
    if(j.ok){
      msg.className = 'msg-top ok';
      msg.textContent = '✓ Precios guardados. El formulario público los reflejará en su próxima carga.';
      cargarPrecios();
    } else {
      msg.className = 'msg-top err';
      msg.textContent = 'Error guardando precios: ' + (j.error || '');
    }
    msg.scrollIntoView({behavior:'smooth', block:'center'});
  })
  .catch(function(err){
    btn.disabled = false; btn.textContent = 'Guardar precios';
    var msg = document.getElementById('msgTop');
    msg.className = 'msg-top err';
    msg.textContent = 'Error de conexión: ' + err.message;
  });
});

// =================== REENVÍO DE CONTRATO EN PDF ===================
function blobToBase64(blob){
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(){
      var result = reader.result; // data:application/pdf;base64,XXXX
      resolve(result.slice(result.indexOf(',') + 1));
    };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function enviarContratoDesdeFila(row, btn){
  var textoOriginal = btn.textContent;
  btn.disabled = true; btn.textContent = 'Generando PDF…';

  var d = {
    nombre: row['Nombre'], dni: row['DNI'], tel: row['Teléfono'], email: row['Email'], dir: row['Dirección'],
    fechaFmt: fmtFecha(row['Fecha boda']), hora: row['Hora'], lugar: row['Lugar evento'],
    dirSrv: row['Dir. servicio'], dirSrv2: row['2ª dirección'],
    serviciosNovia: toList(row['Servicios novia']), combinados: toList(row['Combinados']),
    invitadas: toList(row['Invitadas']), zona: row['Zona'],
    desplazamiento: Number(row['Desplazamiento (€)']) || 0,
    beautyCorner: parseBeautyCorner(row['Beauty Corner']),
    subtotalNovia: Number(row['Subtotal novia (€)']) || 0,
    subtotalInvitadas: Number(row['Subtotal invitadas (€)']) || 0,
    descuentoPct: Number(row['Dto (%)']) || 0,
    descuentoImporte: Number(row['Dto (€)']) || 0,
    total: Number(row['Total (€)']) || 0,
    deposito: row['Depósito (€)'],
    firma: row['Firma'] || null,
    hoy: fmtFecha(row['Fecha registro']),
    logoB64: null
  };

  var cont = document.getElementById('contratoImprimible');
  cont.innerHTML = ContractPDF.buildHTML(d);

  var fechaBoda = new Date(row['Fecha boda']);
  var fechaStr = !isNaN(fechaBoda.getTime()) ? fechaBoda.toISOString().slice(0,10).replace(/-/g,'') : 'contrato';
  var nombreArchivo = fechaStr + '_' + String(row['Nombre']||'novia').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_áéíóúÁÉÍÓÚñÑ]/g,'');

  var msg = document.getElementById('msgTop');

  ContractPDF.renderToPDF(cont, nombreArchivo, { download:false })
    .then(function(blob){
      btn.textContent = 'Enviando…';
      return blobToBase64(blob);
    })
    .then(function(base64){
      return fetch('/api/send-final-pdf', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': getPassword() },
        body: JSON.stringify({
          rowId: row.rowId, timestampValor: row['Fecha registro'],
          email: row['Email'], nombre: row['Nombre'],
          filename: nombreArchivo + '.pdf', pdfBase64: base64
        })
      });
    })
    .then(function(r){ return r.json(); })
    .then(function(j){
      btn.disabled = false;
      if(j.ok){
        btn.textContent = 'Reenviar contrato';
        msg.className = 'msg-top ok';
        msg.textContent = '✓ Contrato enviado a ' + row['Email'] + '.';
        cargarContratos();
      } else {
        btn.textContent = textoOriginal;
        msg.className = 'msg-top err';
        msg.textContent = 'Error enviando el contrato: ' + (j.error || '');
      }
      msg.scrollIntoView({behavior:'smooth', block:'center'});
    })
    .catch(function(err){
      btn.disabled = false;
      btn.textContent = textoOriginal;
      msg.className = 'msg-top err';
      msg.textContent = 'Error: ' + err.message;
      msg.scrollIntoView({behavior:'smooth', block:'center'});
    });
}

  if(!saved){ showLogin(); return; }
  intentarLogin(saved).then(function(j){

    showDashboard();
    ALL_ROWS = j.rows || [];
    pintarContratos(ALL_ROWS);
    cargarPrecios();

    showLogin('Error de conexión.');
  });
})();
